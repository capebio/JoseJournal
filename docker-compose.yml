# JOSE v1 live stack — the real Casabio components (§24). `docker compose up -d`.
# Then: PERSISTENCE=live npm run db:migrate && PERSISTENCE=live npm run start.
services:
  couchdb:
    image: couchdb:3.3
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: josepw
    ports: ['5984:5984']
    volumes: ['couch-data:/opt/couchdb/data']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5984/_up']
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jose
      POSTGRES_PASSWORD: josepw
      POSTGRES_DB: jose
    ports: ['5432:5432']
    volumes: ['pg-data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jose']
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports: ['9200:9200']
    volumes: ['es-data:/usr/share/elasticsearch/data']

  redis:
    image: redis:7
    ports: ['6379:6379']

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: joseminio
      MINIO_ROOT_PASSWORD: joseminiopw
    ports: ['9000:9000', '9001:9001']
    volumes: ['minio-data:/data']

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ['start-dev', '--import-realm']
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ['8080:8080']
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

volumes:
  couch-data:
  pg-data:
  es-data:
  minio-data:
